# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    # Dossier où sont sauvegardés les fichiers joints aux secrets.
    # Les fichiers sont stockés sur disque — jamais en base64 en BDD.
    attachments_directory: '%kernel.project_dir%/var/attachments'

services:

    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\EventListener\LocaleListener:
        tags:
            - { name: kernel.event_subscriber }
