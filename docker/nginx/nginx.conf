server {
    listen 80;
    server_name localhost;
    root /var/www/public;

    # Logs
    access_log /var/log/nginx/securbox_access.log;
    error_log  /var/log/nginx/securbox_error.log;

    # Taille max upload
    client_max_body_size 20M;

    location / {
        # Essaie le fichier directement, sinon passe à index.php
        try_files $uri /index.php$is_args$args;
    }

    # Passe les requêtes PHP à PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Empêche URIs contenant index.php
        internal;
    }

    # Bloquer l'accès aux autres fichiers .php
    location ~ \.php$ {
        return 404;
    }

    # Assets statiques — cache long
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Sécurité : bloquer accès aux fichiers cachés
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
